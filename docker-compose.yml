version: '3.8'

services:
  mongodb:
    image: mongo:6
    container_name: dd-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    build: ./backend
    container_name: dd-backend
    ports:
      - "8080:8080"
    depends_on:
      - mongodb
    environment:
      - DB_HOST=mongodb

  frontend:
    build: ./frontend
    container_name: dd-frontend
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  mongo-data: